name: Daily ParentMail Calendar Sync

on:
  # Run daily at 6:00 AM UK time (6:00 AM GMT / 7:00 AM BST)
  schedule:
    - cron: '0 6 * * *'

  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      debug_mode:
        description: 'Enable debug logging'
        required: false
        default: 'false'
        type: boolean

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Run ParentMail sync
        env:
          PARENTMAIL_EMAIL: ${{ secrets.PARENTMAIL_EMAIL }}
          PARENTMAIL_PASSWORD: ${{ secrets.PARENTMAIL_PASSWORD }}
          GOOGLE_CALENDAR_TOKEN: ${{ secrets.GOOGLE_CALENDAR_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.PARENTMAIL_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          python daily_sync.py

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-artifacts
          path: |
            *.log
            *.png
            screenshots/
          retention-days: 7
